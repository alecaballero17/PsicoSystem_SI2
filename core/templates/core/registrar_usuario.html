<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CU02 - Registro de Psicólogos | PsicoSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card shadow border-0">
                    <div class="card-header bg-success text-white p-3 text-center">
                        <h4 class="mb-0">CU02: Registro de Personal (Psicólogos)</h4>
                    </div>
                    <div class="card-body p-4">
                        <form method="post">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <hr>
                            <button type="submit" class="btn btn-success w-100">Crear Cuenta de Usuario</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
